name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'  # Semantic versioning: v1.0.0, v2.1.3, v1.0.0-beta.1

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
            artifact_name: ai-tool-center-linux-x64
          - os: macos-latest
            platform: darwin
            arch: x64
            artifact_name: ai-tool-center-darwin-x64
          - os: macos-14
            platform: darwin
            arch: arm64
            artifact_name: ai-tool-center-darwin-arm64
          - os: windows-latest
            platform: windows
            arch: x64
            artifact_name: ai-tool-center-windows-x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend
        run: bun run build

      - name: Compile executable
        run: bun run compile

      - name: Prepare release artifact
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "windows" ]; then
            EXE=ai-tool-center.exe
          else
            EXE=ai-tool-center
          fi
          mkdir -p release
          cp "$EXE" release/
          cp -r dist release/
          cd release
          tar czvf "../${{ matrix.artifact_name }}.tar.gz" .
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts for release
        run: |
          echo "Artifacts to be published:"
          find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*/*.tar.gz
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
